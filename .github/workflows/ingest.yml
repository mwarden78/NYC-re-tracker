name: Daily NYC Data Ingestion

on:
  schedule:
    - cron: "0 6 * * *"  # 6am UTC daily
  workflow_dispatch:       # manual trigger

jobs:
  # ── Step 1: Fetch new properties from NYC Open Data ──────────────────────
  ingest:
    name: 1 · Ingest NYC Open Data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run ingestion script
        id: ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: |
          python data/ingest_nyc_open_data.py 2>&1 | tee ingest.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Summarize results
        if: always()
        run: |
          echo "## Ingestion Summary" >> "$GITHUB_STEP_SUMMARY"
          UPSERTED=$(grep -oP 'Total: \K[0-9]+' ingest.log || echo "unknown")
          echo "- **Records upserted:** $UPSERTED" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if ingestion errored
        if: steps.ingest.outputs.exit_code != '0'
        run: exit 1

  # ── Step 2: Fill any lat/lng or BBL gaps left by ingest ──────────────────
  backfill-geocoding:
    name: 2 · Backfill geocoding gaps
    runs-on: ubuntu-latest
    needs: ingest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python data/backfill_geocoding.py

  # ── Step 3: Enrichments that need BBL (run in parallel after geocoding) ──
  enrich-pluto:
    name: 3a · Enrich PLUTO (assessed value, zoning)
    runs-on: ubuntu-latest
    needs: backfill-geocoding

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: python data/enrich_pluto.py

  enrich-last-sale:
    name: 3b · Enrich ACRIS deed sales
    runs-on: ubuntu-latest
    needs: backfill-geocoding

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: python data/enrich_last_sale.py

  enrich-lien-amount:
    name: 3c · Enrich ACRIS lien amounts
    runs-on: ubuntu-latest
    needs: backfill-geocoding

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: python data/enrich_lien_amount.py

  ingest-violations:
    name: 3d · Ingest HPD + DOB violations
    runs-on: ubuntu-latest
    needs: backfill-geocoding

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: python data/ingest_violations.py

  ingest-lien-history:
    name: 3e · Ingest lien sale history
    runs-on: ubuntu-latest
    needs: backfill-geocoding

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: python data/ingest_lien_history.py

  # ── Step 4: Walk Score (requires separate API key, skips if not set) ──────
  enrich-walk-score:
    name: 4 · Enrich Walk/Transit/Bike scores
    runs-on: ubuntu-latest
    needs:
      - enrich-pluto
      - enrich-last-sale
      - enrich-lien-amount
      - ingest-violations
      - ingest-lien-history
    # Skip this job entirely if the API key secret isn't configured
    if: ${{ secrets.WALKSCORE_API_KEY != '' }}
    continue-on-error: true   # daily API limit hit = soft failure, not a blocker

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WALKSCORE_API_KEY: ${{ secrets.WALKSCORE_API_KEY }}
        run: python data/enrich_walk_score.py
