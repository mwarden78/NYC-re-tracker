# Gitleaks configuration
# See: https://github.com/gitleaks/gitleaks#configuration

[extend]
# Use the default gitleaks config as a base
useDefault = true

[allowlist]
# Allow test files that may contain fake/mock API keys
# Also allowlist Claude Code session files which contain auto-approved command history
paths = [
    '''tests/.*\.py$''',
    '''test_.*\.py$''',
    '''\.claude/settings\.local\.json$''',
]

# Allow specific patterns used in tests
regexes = [
    '''test-fake-key.*''',
    '''lin_api_test.*''',
]

# Suppress specific historical findings by fingerprint
# .claude/settings.local.json is path-allowlisted but the commit diff is still scanned;
# adding the fingerprint here ensures gitleaks skips these findings.
[[allowlist.findings]]
description = "Linear API key in auto-approved commands (settings.local.json is allowlisted)"
fingerprints = [
    "78a51df5b3dbf9dc273a3b001b270829292b3d31:.claude/settings.local.json:linear-api-key:44",
]
